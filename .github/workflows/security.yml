name: Security

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]
  schedule:
    - cron: "0 7 * * 1"

jobs:
  dependency-audit:
    name: npm audit (SCA)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  secret-scan:
    name: Gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Use the open-source Gitleaks CLI (free). gitleaks/gitleaks-action@v2
      # requires a paid license for organization repositories.
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.22.1
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Detect secrets
        run: gitleaks detect --source . --redact --verbose
